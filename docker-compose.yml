version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: nexus-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: always

  frontend:
    build:
      context: ./webapp
    container_name: nexus-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
